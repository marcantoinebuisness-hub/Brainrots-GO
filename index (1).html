<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brainrot Go 🧠</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --common: #9CA3AF;
  --rare: #60A5FA;
  --epic: #C084FC;
  --legendary: #FBBF24;
  --mythic: #F87171;
  --god: #34D399;
  --secret: #F472B6;
  --og: #FCD34D;
  --bg: #0a0a14;
  --card: #13131f;
  --border: rgba(255,255,255,0.07);
  --accent: #C084FC;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

/* HEADER */
#header {
  background: linear-gradient(135deg, #1a0533 0%, #0a0a14 100%);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 1000;
  flex-shrink: 0;
}
#header h1 {
  font-family: 'Bangers', cursive;
  font-size: 26px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #C084FC, #60A5FA, #FBBF24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink: 0;
}
#xp-wrap { flex: 1; }
#xp-label { font-size: 10px; color: #666; margin-bottom: 2px; }
#xp-bar { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
#xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #C084FC, #60A5FA); border-radius: 3px; transition: width 0.5s; }
#lvl-badge {
  font-family: 'Bangers', cursive;
  font-size: 18px;
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
#caught-count {
  font-size: 11px;
  color: #888;
  flex-shrink: 0;
  text-align: right;
}
#caught-count b { color: var(--legendary); }

/* MAP */
#map { flex: 1; z-index: 1; }
.leaflet-tile-pane { filter: brightness(0.65) saturate(0.5) hue-rotate(210deg); }

/* NAV */
#nav { background: #0d0d1a; border-top: 1px solid var(--border); display: flex; z-index: 1000; flex-shrink: 0; }
.nav-btn { flex: 1; padding: 9px 0 7px; background: none; border: none; color: #444; font-size: 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 1px; transition: color 0.2s; font-family: 'Nunito', sans-serif; }
.nav-btn span { font-size: 9px; }
.nav-btn.active { color: var(--accent); }

/* PANELS */
.panel { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
.panel.open { display: flex; }
.panel-hd { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--card); flex-shrink: 0; }
.panel-hd h2 { font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 1px; }
.close-btn { margin-left: auto; background: none; border: none; color: #666; font-size: 22px; cursor: pointer; padding: 2px 8px; }
.panel-body { flex: 1; overflow-y: auto; padding: 14px; }

/* RARITY FILTERS */
.filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.filt { padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: none; color: #666; font-size: 10px; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; transition: all 0.15s; }
.filt.on { color: #fff; border-color: transparent; background: #2a2a3a; }

/* POKÉDEX GRID */
#dex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.dex-card {
  background: var(--card);
  border-radius: 10px;
  padding: 8px 6px;
  text-align: center;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
}
.dex-card:active { transform: scale(0.95); }
.dex-card.locked { opacity: 0.25; filter: grayscale(1); }
.dex-img { width: 52px; height: 52px; object-fit: contain; margin: 0 auto 4px; display: block; border-radius: 8px; background: rgba(255,255,255,0.03); }
.dex-img-placeholder { width: 52px; height: 52px; margin: 0 auto 4px; display: flex; align-items: center; justify-content: center; font-size: 30px; border-radius: 8px; background: rgba(255,255,255,0.03); }
.dex-name { font-size: 8px; font-weight: 700; line-height: 1.2; }
.dex-rar { font-size: 7px; margin-top: 2px; opacity: 0.8; }
.dex-cnt { position: absolute; top: 3px; right: 5px; font-size: 9px; font-weight: 900; color: var(--legendary); }

/* COLLECTION */
#col-list { display: flex; flex-direction: column; gap: 8px; }
.col-item { background: var(--card); border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 10px; border-left: 3px solid; }
.col-img { width: 44px; height: 44px; object-fit: contain; border-radius: 6px; flex-shrink: 0; }
.col-info { flex: 1; min-width: 0; }
.col-name { font-weight: 900; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-desc { font-size: 10px; color: #777; margin-top: 1px; }
.col-rar { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; display: inline-block; margin-top: 3px; }
.col-cnt { font-size: 11px; color: #666; flex-shrink: 0; }

/* CATCH MODAL */
#catch-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
#catch-modal.open { display: flex; }
#catch-box { background: var(--card); border-radius: 20px; padding: 28px 20px 20px; text-align: center; max-width: 300px; width: 90%; border: 1px solid var(--border); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#catch-img { width: 100px; height: 100px; object-fit: contain; margin: 0 auto 12px; display: block; animation: float 2s infinite ease-in-out; border-radius: 12px; background: rgba(255,255,255,0.03); }
#catch-emoji-fallback { font-size: 80px; margin-bottom: 12px; animation: float 2s infinite ease-in-out; display: none; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
#catch-name { font-family: 'Bangers', cursive; font-size: 24px; letter-spacing: 1px; margin-bottom: 4px; }
#catch-rar { margin-bottom: 6px; }
#catch-desc { font-size: 12px; color: #999; margin-bottom: 16px; line-height: 1.4; }
.catch-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; font-family: 'Bangers', cursive; font-size: 20px; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; margin-bottom: 6px; }
.catch-btn:active { transform: scale(0.97); }
#btn-catch { background: linear-gradient(135deg, #C084FC, #818CF8); color: #fff; }
#btn-run { background: rgba(255,255,255,0.05); color: #666; font-size: 14px; padding: 9px; }

/* MARKER */
.b-marker { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; cursor: pointer; box-shadow: 0 0 14px currentColor; animation: pulse 2.5s infinite; overflow: hidden; background: var(--card); }
.b-marker img { width: 34px; height: 34px; object-fit: contain; border-radius: 4px; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

/* RARITY BADGE */
.rbadge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }

/* TOAST */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--card); border: 1px solid var(--accent); color: #fff; padding: 9px 18px; border-radius: 30px; font-size: 12px; font-weight: 700; z-index: 4000; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: #444; font-size: 13px; line-height: 1.8; }

/* DEX STATS */
#dex-stats { font-size: 11px; color: #555; margin-bottom: 10px; }
#dex-stats b { color: var(--legendary); }
</style>
</head>
<body>

<div id="header">
  <h1>🧠 BRAINROT GO</h1>
  <div id="xp-wrap">
    <div id="xp-label">LVL <span id="lvl-num">1</span> · <span id="xp-num">0</span>/<span id="xp-max">100</span> XP</div>
    <div id="xp-bar"><div id="xp-fill"></div></div>
  </div>
  <div id="lvl-badge">1</div>
  <div id="caught-count">🎒 <b id="hd-caught">0</b></div>
</div>

<div id="map"></div>

<div id="nav">
  <button class="nav-btn active" id="nav-map" onclick="showTab('map')">🗺️<span>Carte</span></button>
  <button class="nav-btn" id="nav-dex" onclick="showTab('dex')">📖<span>Dex</span></button>
  <button class="nav-btn" id="nav-col" onclick="showTab('col')">🎒<span>Collection</span></button>
</div>

<!-- POKÉDEX -->
<div class="panel" id="panel-dex">
  <div class="panel-hd">
    <h2>📖 BRAINRÔTDEX</h2>
    <button class="close-btn" onclick="showTab('map')">✕</button>
  </div>
  <div class="panel-body">
    <div id="dex-stats">Chargement...</div>
    <div class="filters" id="dex-filters"></div>
    <div id="dex-grid"></div>
  </div>
</div>

<!-- COLLECTION -->
<div class="panel" id="panel-col">
  <div class="panel-hd">
    <h2>🎒 MA COLLECTION</h2>
    <button class="close-btn" onclick="showTab('map')">✕</button>
  </div>
  <div class="panel-body">
    <div id="col-list"></div>
  </div>
</div>

<!-- CATCH MODAL -->
<div id="catch-modal">
  <div id="catch-box">
    <img id="catch-img" src="" alt="" onerror="this.style.display='none';document.getElementById('catch-emoji-fallback').style.display='block'"/>
    <div id="catch-emoji-fallback"></div>
    <div id="catch-name"></div>
    <div id="catch-rar"></div>
    <div id="catch-desc"></div>
    <button class="catch-btn" id="btn-catch" onclick="doCatch()">⚡ ATTRAPER !</button>
    <button class="catch-btn" id="btn-run" onclick="closeCatch()">Fuir</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const S = {
  level: 1, xp: 0, xpMax: 100,
  caught: {},
  pos: null,
  markers: [],
  current: null,
};

function load() {
  try { const d = JSON.parse(localStorage.getItem("bgo2")||"{}"); if(d.caught) S.caught=d.caught; if(d.level) S.level=d.level; if(d.xp!==undefined) S.xp=d.xp; if(d.xpMax) S.xpMax=d.xpMax; } catch(e){}
}
function save() { localStorage.setItem("bgo2", JSON.stringify({caught:S.caught,level:S.level,xp:S.xp,xpMax:S.xpMax})); }

function addXP(n) {
  S.xp += n;
  while(S.xp >= S.xpMax) { S.xp -= S.xpMax; S.level++; S.xpMax = Math.floor(S.xpMax*1.4); toast(`🎉 NIVEAU ${S.level} !`); }
  updateHUD(); save();
}

function updateHUD() {
  document.getElementById("lvl-num").textContent = S.level;
  document.getElementById("lvl-badge").textContent = S.level;
  document.getElementById("xp-num").textContent = S.xp;
  document.getElementById("xp-max").textContent = S.xpMax;
  document.getElementById("xp-fill").style.width = (S.xp/S.xpMax*100)+"%";
  const c = Object.keys(S.caught).length;
  document.getElementById("hd-caught").textContent = c;
}

// ══════════════════════════════════════════
// MAP
// ══════════════════════════════════════════
let map, playerM;

function initMap() {
  map = L.map("map", {zoomControl:false, attributionControl:false});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19}).addTo(map);
  if(navigator.geolocation) {
    navigator.geolocation.watchPosition(onPos, ()=>fallback(), {enableHighAccuracy:true, maximumAge:5000, timeout:12000});
  } else fallback();
}

function fallback() { onPos({coords:{latitude:48.8566,longitude:2.3522}}); }

function onPos(p) {
  const lat=p.coords.latitude, lng=p.coords.longitude;
  S.pos=[lat,lng];
  if(!playerM) {
    map.setView([lat,lng],16);
    playerM = L.marker([lat,lng],{icon:L.divIcon({className:"",html:`<div style="width:18px;height:18px;background:#C084FC;border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px #C084FC"></div>`,iconAnchor:[9,9]})}).addTo(map);
    spawnAll();
  } else playerM.setLatLng([lat,lng]);
}

function weightedRarity() {
  const r = Math.random();
  let acc = 0;
  for(const [name, d] of Object.entries(RARITY)) {
    acc += d.spawn;
    if(r < acc) return name;
  }
  return "Common";
}

function spawnAll() {
  if(!S.pos) return;
  S.markers.forEach(m => map.removeLayer(m));
  S.markers = [];
  const count = 5 + Math.floor(Math.random()*4);
  for(let i=0;i<count;i++) setTimeout(()=>spawnOne(),i*250);
  setTimeout(spawnAll, 150000);
}

function spawnOne() {
  if(!S.pos) return;
  const rar = weightedRarity();
  const pool = BRAINROTS.filter(b=>b.rar===rar);
  if(!pool.length) return;
  const b = pool[Math.floor(Math.random()*pool.length)];
  const col = RARITY[rar].color;
  const lat = S.pos[0]+(Math.random()-0.5)*0.009;
  const lng = S.pos[1]+(Math.random()-0.5)*0.013;
  const html = `<div class="b-marker" style="border-color:${col};color:${col}">${b.emoji}</div>`;
  const marker = L.marker([lat,lng],{icon:L.divIcon({className:"",html,iconSize:[46,46],iconAnchor:[23,23]})}).addTo(map);
  marker.on("click",()=>openCatch(b));
  S.markers.push(marker);
}

// ══════════════════════════════════════════
// CATCH
// ══════════════════════════════════════════
function openCatch(b) {
  S.current = b;
  const col = RARITY[b.rar].color;
  const imgEl = document.getElementById("catch-img");
  const fallEl = document.getElementById("catch-emoji-fallback");
  imgEl.style.display = "block";
  fallEl.style.display = "none";
  fallEl.textContent = b.emoji;
  // Try to load image from fandom wiki
  imgEl.src = `https://static.wikia.nocookie.net/italian-brainrot/images/thumb/search/${encodeURIComponent(b.nom)}.png/200px-${encodeURIComponent(b.nom)}.png`;
  imgEl.onerror = function() { this.style.display="none"; fallEl.style.display="block"; };
  document.getElementById("catch-name").textContent = b.nom;
  document.getElementById("catch-rar").innerHTML = `<span class="rbadge" style="background:${col}22;color:${col};border:1px solid ${col}40">${b.rar}</span>`;
  document.getElementById("catch-desc").textContent = b.desc;
  document.getElementById("catch-modal").classList.add("open");
}

function closeCatch() { document.getElementById("catch-modal").classList.remove("open"); S.current=null; }

function doCatch() {
  const b = S.current; if(!b) return;
  const rate = RARITY[b.rar].rate;
  if(Math.random()<rate) {
    S.caught[b.id]=(S.caught[b.id]||0)+1;
    addXP(RARITY[b.rar].xp);
    closeCatch();
    toast(`${b.emoji} ${b.nom} capturé ! +${RARITY[b.rar].xp} XP`);
  } else {
    closeCatch();
    toast(`💨 ${b.nom} s'est échappé !`);
  }
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function showTab(t) {
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("open"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  if(t==="dex") { document.getElementById("panel-dex").classList.add("open"); document.getElementById("nav-dex").classList.add("active"); renderDex("all"); }
  else if(t==="col") { document.getElementById("panel-col").classList.add("open"); document.getElementById("nav-col").classList.add("active"); renderCol(); }
  else document.getElementById("nav-map").classList.add("active");
}

// ══════════════════════════════════════════
// POKÉDEX
// ══════════════════════════════════════════
let dexFilter = "all";

function renderDex(f) {
  dexFilter = f;
  const total = Object.keys(S.caught).length;
  document.getElementById("dex-stats").innerHTML = `<b>${total}</b>/${BRAINROTS.length} capturés`;

  // Filters
  const rarities = ["all",...Object.keys(RARITY)];
  document.getElementById("dex-filters").innerHTML = rarities.map(r=>
    `<button class="filt ${dexFilter===r?"on":""}" onclick="renderDex('${r}')">${r==="all"?"Tous":r}</button>`
  ).join("");

  const list = f==="all" ? BRAINROTS : BRAINROTS.filter(b=>b.rar===f);
  const col = r => RARITY[r]?.color || "#fff";
  document.getElementById("dex-grid").innerHTML = list.map(b=>{
    const caught = S.caught[b.id]||0;
    const c = col(b.rar);
    return `<div class="dex-card ${caught?"":" locked"}" style="border-color:${caught?c+"44":"transparent"}" onclick="${caught?`showDexInfo(${b.id})`:""}">
      ${caught?`<div class="dex-cnt">x${caught}</div>`:""}
      <div class="dex-img-placeholder" style="font-size:${caught?28:20}px">${caught?b.emoji:"❓"}</div>
      <div class="dex-name">${caught?b.nom:"???"}</div>
      <div class="dex-rar" style="color:${c}">${b.rar}</div>
    </div>`;
  }).join("");
}

function showDexInfo(id) {
  const b = BRAINROTS.find(x=>x.id===id);
  if(!b) return;
  toast(`${b.emoji} ${b.nom} · ${b.rar} · ${b.desc}`);
}

// ══════════════════════════════════════════
// COLLECTION
// ══════════════════════════════════════════
function renderCol() {
  const caught = BRAINROTS.filter(b=>S.caught[b.id]);
  if(!caught.length) {
    document.getElementById("col-list").innerHTML = `<div class="empty">Aucun brainrot capturé...<br>Va explorer la carte !</div>`;
    return;
  }
  const col = r => RARITY[r]?.color || "#fff";
  document.getElementById("col-list").innerHTML = caught.map(b=>{
    const c = col(b.rar);
    return `<div class="col-item" style="border-left-color:${c}">
      <div style="font-size:36px;flex-shrink:0">${b.emoji}</div>
      <div class="col-info">
        <div class="col-name">${b.nom}</div>
        <div class="col-desc">${b.desc}</div>
        <span class="col-rar" style="background:${c}18;color:${c};border:1px solid ${c}30">${b.rar}</span>
      </div>
      <div class="col-cnt">x${S.caught[b.id]}</div>
    </div>`;
  }).join("");
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function toast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load(); updateHUD(); initMap();
</script>
</body>
</html>
