<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brainrot Go 🧠</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a14; --card: #13131f; --border: rgba(255,255,255,0.07);
  --accent: #C084FC;
  --Common: #9CA3AF; --Rare: #60A5FA; --Epic: #C084FC;
  --Legendary: #FBBF24; --Mythic: #F87171;
  --BrainrotGod: #34D399; --Secret: #F472B6; --OG: #FCD34D;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

/* HEADER */
#header { background: linear-gradient(135deg,#1a0533,#0a0a14); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 10px; z-index: 1000; flex-shrink: 0; }
#header h1 { font-family:'Bangers',cursive; font-size:24px; letter-spacing:2px; background:linear-gradient(135deg,#C084FC,#60A5FA,#FBBF24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; flex-shrink:0; }
#xp-wrap { flex:1; }
#xp-label { font-size:10px; color:#666; margin-bottom:2px; }
#xp-bar { height:5px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
#xp-fill { height:100%; width:0%; background:linear-gradient(90deg,#C084FC,#60A5FA); border-radius:3px; transition:width 0.5s; }
#lvl-badge { font-family:'Bangers',cursive; font-size:18px; background:var(--card); border:1px solid var(--accent); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0; }
#hd-right { font-size:10px; color:#666; flex-shrink:0; text-align:right; line-height:1.4; }
#hd-right b { color:var(--Legendary); }

/* GAMEPASS BADGE */
#gp-badge { background:linear-gradient(135deg,#FBBF24,#F87171); color:#000; font-size:9px; font-weight:900; padding:2px 6px; border-radius:10px; }

/* MAP */
#map { flex:1; z-index:1; }
.leaflet-tile-pane { filter:brightness(0.65) saturate(0.5) hue-rotate(210deg); }

/* NAV */
#nav { background:#0d0d1a; border-top:1px solid var(--border); display:flex; z-index:1000; flex-shrink:0; }
.nav-btn { flex:1; padding:9px 0 7px; background:none; border:none; color:#444; font-size:20px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px; transition:color 0.2s; font-family:'Nunito',sans-serif; }
.nav-btn span { font-size:9px; }
.nav-btn.active { color:var(--accent); }

/* PANELS */
.panel { position:fixed; inset:0; background:var(--bg); z-index:2000; display:none; flex-direction:column; }
.panel.open { display:flex; }
.panel-hd { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--card); flex-shrink:0; }
.panel-hd h2 { font-family:'Bangers',cursive; font-size:22px; letter-spacing:1px; }
.close-btn { margin-left:auto; background:none; border:none; color:#666; font-size:22px; cursor:pointer; padding:2px 8px; }
.panel-body { flex:1; overflow-y:auto; padding:14px; }

/* FILTERS */
.filters { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }
.filt { padding:3px 9px; border-radius:20px; border:1px solid var(--border); background:none; color:#666; font-size:10px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; transition:all 0.15s; }
.filt.on { color:#fff; border-color:transparent; background:#2a2a3a; }

/* POKÉDEX */
#dex-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.dex-card { background:var(--card); border-radius:10px; padding:8px 6px; text-align:center; border:1px solid var(--border); cursor:pointer; transition:transform 0.15s; position:relative; overflow:hidden; }
.dex-card:active { transform:scale(0.95); }
.dex-card.locked { opacity:0.22; filter:grayscale(1); }
.dex-card.caught-once { opacity:1; }
.dex-thumb { width:52px; height:52px; object-fit:contain; margin:0 auto 4px; display:block; border-radius:8px; }
.dex-fallback { width:52px; height:52px; margin:0 auto 4px; display:flex; align-items:center; justify-content:center; font-size:28px; border-radius:8px; background:rgba(255,255,255,0.03); }
.dex-name { font-size:8px; font-weight:700; line-height:1.2; }
.dex-rar { font-size:7px; margin-top:2px; }
.dex-mut { position:absolute; top:3px; left:4px; font-size:9px; }
.caught-badge { position:absolute; top:3px; right:4px; font-size:9px; color:#4ADE80; font-weight:900; }

/* COLLECTION */
#col-list { display:flex; flex-direction:column; gap:8px; }
.col-item { background:var(--card); border-radius:10px; padding:10px; display:flex; align-items:center; gap:10px; border-left:3px solid; }
.col-emoji { font-size:36px; flex-shrink:0; }
.col-info { flex:1; min-width:0; }
.col-name { font-weight:900; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.col-desc { font-size:10px; color:#777; margin-top:1px; }
.col-mut { font-size:10px; margin-top:2px; }
.col-rar { font-size:9px; font-weight:700; padding:2px 6px; border-radius:10px; display:inline-block; margin-top:3px; }

/* GAMEPASS PANEL */
#gp-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.gp-card { background:var(--card); border-radius:12px; padding:14px; border:1px solid var(--border); text-align:center; }
.gp-card.owned { border-color:#4ADE80; background:#0a2a0a; }
.gp-icon { font-size:36px; margin-bottom:8px; }
.gp-name { font-family:'Bangers',cursive; font-size:16px; letter-spacing:1px; margin-bottom:4px; }
.gp-desc { font-size:10px; color:#888; margin-bottom:10px; line-height:1.4; }
.gp-price { font-size:13px; font-weight:900; color:var(--Legendary); margin-bottom:8px; }
.gp-btn { width:100%; padding:8px; border-radius:8px; border:none; font-family:'Bangers',cursive; font-size:14px; cursor:pointer; background:linear-gradient(135deg,#C084FC,#818CF8); color:#fff; }
.gp-btn:disabled { background:#2a2a2a; color:#555; cursor:default; }
#coins-display { font-size:12px; color:var(--Legendary); margin-bottom:12px; font-weight:700; }

/* CATCH MODAL */
#catch-modal { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:3000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
#catch-modal.open { display:flex; }
#catch-box { background:var(--card); border-radius:20px; padding:24px 18px 18px; text-align:center; max-width:300px; width:92%; border:1px solid var(--border); }

/* MINI-JEU */
#game-area { margin-bottom:16px; }
#game-msg { font-size:13px; color:#aaa; margin-bottom:10px; min-height:20px; }
#catch-creature { font-size:72px; margin-bottom:8px; animation:float 1.5s infinite ease-in-out; cursor:pointer; user-select:none; display:inline-block; transition:transform 0.1s; }
#catch-creature:active { transform:scale(0.85) !important; }
@keyframes float { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(3deg)} }
#hp-bar-wrap { height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; margin-bottom:6px; }
#hp-bar { height:100%; width:100%; background:linear-gradient(90deg,#4ADE80,#FBBF24); border-radius:4px; transition:width 0.3s; }
#tap-hint { font-size:11px; color:#555; margin-bottom:10px; }
#catch-name { font-family:'Bangers',cursive; font-size:22px; letter-spacing:1px; margin-bottom:3px; }
#catch-rar { margin-bottom:4px; }
#catch-mut { font-size:11px; margin-bottom:8px; min-height:16px; }
#catch-desc { font-size:11px; color:#888; margin-bottom:14px; line-height:1.4; }
.catch-btn { width:100%; padding:11px; border-radius:10px; border:none; font-family:'Bangers',cursive; font-size:18px; letter-spacing:1px; cursor:pointer; transition:transform 0.1s; margin-bottom:6px; }
.catch-btn:active { transform:scale(0.97); }
#btn-run { background:rgba(255,255,255,0.05); color:#666; font-size:13px; padding:8px; }

/* ALREADY CAUGHT */
#already-msg { background:#1a1a0a; border:1px solid #FBBF2440; border-radius:10px; padding:10px; margin-bottom:10px; font-size:11px; color:#FBBF24; }

/* MARKER */
.b-marker { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid; cursor:pointer; box-shadow:0 0 14px currentColor; animation:pulse 2.5s infinite; background:var(--card); font-size:24px; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.b-marker.nearby { animation:pulse-fast 0.8s infinite; box-shadow:0 0 20px currentColor; }
@keyframes pulse-fast { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

/* BADGE */
.rbadge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }

/* TOAST */
#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--card); border:1px solid var(--accent); color:#fff; padding:9px 18px; border-radius:30px; font-size:12px; font-weight:700; z-index:4000; opacity:0; transition:all 0.3s; white-space:nowrap; pointer-events:none; max-width:90vw; text-overflow:ellipsis; overflow:hidden; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* NEARBY ALERT */
#nearby-alert { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:#1a0a2a; border:1px solid var(--accent); color:#fff; padding:8px 16px; border-radius:30px; font-size:12px; font-weight:700; z-index:999; opacity:0; transition:all 0.3s; pointer-events:none; }
#nearby-alert.show { opacity:1; }

.empty { text-align:center; padding:40px 20px; color:#444; font-size:13px; line-height:1.8; }
#dex-stats { font-size:11px; color:#555; margin-bottom:10px; }
</style>
</head>
<body>

<div id="header">
  <h1>🧠 BRAINROT GO</h1>
  <div id="xp-wrap">
    <div id="xp-label">LVL <span id="lvl-num">1</span> · <span id="xp-num">0</span>/<span id="xp-max">100</span> XP</div>
    <div id="xp-bar"><div id="xp-fill"></div></div>
  </div>
  <div id="lvl-badge">1</div>
  <div id="hd-right">🎒<b id="hd-caught">0</b><br>🪙<b id="hd-coins">0</b></div>
</div>

<div id="map"></div>
<div id="nearby-alert">⚡ Brainrot nearby !</div>

<div id="nav">
  <button class="nav-btn active" id="nav-map" onclick="showTab('map')">🗺️<span>Carte</span></button>
  <button class="nav-btn" id="nav-dex" onclick="showTab('dex')">📖<span>Dex</span></button>
  <button class="nav-btn" id="nav-col" onclick="showTab('col')">🎒<span>Collection</span></button>
  <button class="nav-btn" id="nav-gp" onclick="showTab('gp')">💎<span>GamePass</span></button>
</div>

<!-- POKÉDEX -->
<div class="panel" id="panel-dex">

  <div class="panel-body">
    <div class="filters" id="dex-filters"></div>
    <div id="dex-grid"></div>
  </div>
</div>

<!-- COLLECTION -->
<div class="panel" id="panel-col">

  <div class="panel-body"><div id="col-list"></div></div>
</div>

<!-- GAMEPASS -->
<div class="panel" id="panel-gp">

  <div class="panel-body">
    <div id="coins-display">🪙 <span id="gp-coins">0</span> coins</div>

      💡 Gagne des coins en capturant des brainrots.<br>
      Les coins servent à acheter des Game Pass.
    </div>
  </div>
</div>

<!-- CATCH MODAL -->
<div id="catch-modal">
  <div id="catch-box">
    <div id="catch-name"></div>
    <div id="catch-rar"></div>
    <div id="catch-mut"></div>
    <div id="already-msg" style="display:none">✅ Déjà capturé ! Tu peux le voir dans ta collection.</div>
    <div id="game-area">
      <div id="game-msg"></div>

      <div id="tap-hint"></div>

    </div>

  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ═══════════════════════════════════════

  {id:"radar",   icon:"📡", name:"Radar Pro",      desc:"Vois les brainrots jusqu'à 500m autour de toi",       price:100,  bonus:"radar"},
  {id:"luck",    icon:"🍀", name:"Luck Boost",     desc:"Chance de mutation x3 à chaque capture",              price:250,  bonus:"luck"},

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const S = {
  level:1, xp:0, xpMax:100, coins:0,
  caught:{},   // id -> {count, mutation}
  passes:[],   // owned gamepass ids
  pos:null, markers:[], current:null,
  gameHP:0, gameMaxHP:0, gameActive:false,
};

function load() {
  try {
    const d = JSON.parse(localStorage.getItem("bgo3")||"{}");
    if(d.caught) S.caught=d.caught;
    if(d.level)  S.level=d.level;
    if(d.xp!==undefined) S.xp=d.xp;
    if(d.xpMax)  S.xpMax=d.xpMax;
    if(d.coins)  S.coins=d.coins;
    if(d.passes) S.passes=d.passes;
  } catch(e){}
}
function save() {
  localStorage.setItem("bgo3", JSON.stringify({caught:S.caught,level:S.level,xp:S.xp,xpMax:S.xpMax,coins:S.coins,passes:S.passes}));
}
function hasPass(id) { return S.passes.includes(id); }

function addXP(n) {
  const mult = hasPass("xp2") ? 2 : 1;
  S.xp += n * mult;
  while(S.xp >= S.xpMax) { S.xp -= S.xpMax; S.level++; S.xpMax=Math.floor(S.xpMax*1.4); toast(`🎉 NIVEAU ${S.level} !`); }
  updateHUD(); save();
}
function addCoins(n) { S.coins += n; updateHUD(); save(); }

function updateHUD() {
  document.getElementById("lvl-num").textContent = S.level;
  document.getElementById("lvl-badge").textContent = S.level;
  document.getElementById("xp-num").textContent = S.xp;
  document.getElementById("xp-max").textContent = S.xpMax;
  document.getElementById("xp-fill").style.width = (S.xp/S.xpMax*100)+"%";
  document.getElementById("hd-caught").textContent = Object.keys(S.caught).length;
  document.getElementById("hd-coins").textContent = S.coins;
  const gc = document.getElementById("gp-coins");
  if(gc) gc.textContent = S.coins;
}

// ═══════════════════════════════════════
// MAP
// ═══════════════════════════════════════
let map, playerM;

function initMap() {
  map = L.map("map",{zoomControl:false,attributionControl:false});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
  if(navigator.geolocation) {
    navigator.geolocation.watchPosition(onPos, ()=>fallback(), {enableHighAccuracy:true,maximumAge:3000,timeout:12000});
  } else fallback();
}

function fallback() { onPos({coords:{latitude:48.8566,longitude:2.3522}}); }

function onPos(p) {
  const lat=p.coords.latitude, lng=p.coords.longitude;
  S.pos=[lat,lng];
  if(!playerM) {
    map.setView([lat,lng],17);
    playerM = L.marker([lat,lng],{icon:L.divIcon({className:"",html:`<div style="width:18px;height:18px;background:#C084FC;border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px #C084FC"></div>`,iconAnchor:[9,9]})}).addTo(map);
    spawnAll();
  } else {
    playerM.setLatLng([lat,lng]);
    checkNearby();
  }
}

function dist(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkNearby() {
  if(!S.pos) return;
  const radius = hasPass("magnet") ? 4 : 2;
  let near = false;
  S.markers.forEach(m => {
    const ll = m.getLatLng();
    const d = dist(S.pos[0],S.pos[1],ll.lat,ll.lng);
    const el = m.getElement();
    if(d <= radius*100) {
      near = true;
      if(el) el.querySelector(".b-marker")?.classList.add("nearby");
    }
  });
  const alert = document.getElementById("nearby-alert");
  if(near) { alert.classList.add("show"); setTimeout(()=>alert.classList.remove("show"),2000); }
}

function weightedRarity() {
  const weights = {...Object.fromEntries(Object.entries(RARITY).map(([k,v])=>[k,v.spawn]))};
  if(hasPass("legend")) { weights["Legendary"]*=3; weights["Mythic"]*=2; }
  const total = Object.values(weights).reduce((a,b)=>a+b,0);
  let r = Math.random()*total, acc=0;
  for(const [name,w] of Object.entries(weights)) { acc+=w; if(r<acc) return name; }
  return "Common";
}

function spawnAll() {
  if(!S.pos) return;
  S.markers.forEach(m=>map.removeLayer(m));
  S.markers=[];
  const count = hasPass("magnet") ? 10 : 6;
  for(let i=0;i<count;i++) setTimeout(()=>spawnOne(),i*200);
  setTimeout(spawnAll,120000);
}

function spawnOne() {
  if(!S.pos) return;
  const rar = weightedRarity();
  const pool = BRAINROTS.filter(b=>b.rar===rar);
  if(!pool.length) return;
  const b = pool[Math.floor(Math.random()*pool.length)];
  const col = RARITY[rar].color;
  const radarRange = hasPass("radar") ? 0.018 : 0.009;
  const lat = S.pos[0]+(Math.random()-0.5)*radarRange;
  const lng = S.pos[1]+(Math.random()-0.5)*radarRange*1.5;
  const html = `<div class="b-marker" style="border-color:${col};color:${col}">${b.e}</div>`;
  const marker = L.marker([lat,lng],{icon:L.divIcon({className:"",html,iconSize:[46,46],iconAnchor:[23,23]})}).addTo(map);
  marker._brainrot = b;
  marker.on("click",()=>{
    if(!S.pos) return;
    const d = dist(S.pos[0],S.pos[1],marker.getLatLng().lat,marker.getLatLng().lng);
    const maxDist = hasPass("magnet") ? 400 : 200;
    if(d > maxDist) { toast(`📍 Trop loin ! Approche-toi (${Math.round(d)}m)`); return; }
    openCatch(b, marker);
  });
  S.markers.push(marker);
}

// ═══════════════════════════════════════
// MINI-JEU CATCH
// ═══════════════════════════════════════
let currentMarker = null;

function openCatch(b, marker) {
  S.current = b;
  currentMarker = marker;
  const col = RARITY[b.rar].color;
  const alreadyCaught = !!S.caught[b.id];

  // Mutation
  let mutation = null;
  const mutChance = hasPass("luck") ? 0.3 : 0.1;
  if(Math.random() < mutChance) {
    const muts = MUTATIONS.filter(m=>m!==null);
    mutation = muts[Math.floor(Math.random()*muts.length)];
  }
  S._pendingMutation = mutation;

  document.getElementById("catch-name").textContent = b.nom;
  document.getElementById("catch-rar").innerHTML = `<span class="rbadge" style="background:${col}22;color:${col};border:1px solid ${col}40">${b.rar}</span>`;
  document.getElementById("catch-mut").textContent = mutation ? `✨ Mutation : ${mutation.name} (${mutation.bonus})` : "";
  document.getElementById("catch-desc").textContent = b.desc;
  document.getElementById("catch-creature").textContent = b.e;

  const alreadyEl = document.getElementById("already-msg");
  alreadyEl.style.display = alreadyCaught ? "block" : "none";

  if(alreadyCaught) {
    // Déjà capturé — on peut juste regarder
    document.getElementById("game-area").style.display = "none";
    document.getElementById("btn-run").textContent = "🔙 Fermer";
  } else {
    // Mini-jeu : tappe pour attraper
    document.getElementById("game-area").style.display = "block";
    document.getElementById("btn-run").textContent = "🏃 Fuir";
    const hp = RARITY[b.rar].catchHP;
    S.gameHP = hp;
    S.gameMaxHP = hp;
    S.gameActive = true;
    updateHPBar();
    document.getElementById("game-msg").textContent = hp===1 ? "Tape le brainrot pour l'attraper !" : `Tape ${hp} fois pour l'attraper !`;
    document.getElementById("tap-hint").textContent = `❤️ ${hp} taps restants`;
    document.getElementById("catch-creature").onclick = tapCreature;
  }

  document.getElementById("catch-modal").classList.add("open");
}

function updateHPBar() {
  const pct = (S.gameHP/S.gameMaxHP)*100;
  document.getElementById("hp-bar").style.width = pct+"%";
  document.getElementById("hp-bar").style.background =
    pct>60 ? "linear-gradient(90deg,#4ADE80,#FBBF24)" :
    pct>30 ? "linear-gradient(90deg,#FBBF24,#F87171)" : "#F87171";
  document.getElementById("tap-hint").textContent = `❤️ ${S.gameHP} tap${S.gameHP>1?"s":""} restant${S.gameHP>1?"s":""}`;
}

function tapCreature() {
  if(!S.gameActive) return;
  const el = document.getElementById("catch-creature");
  el.style.transform = "scale(0.8)";
  setTimeout(()=>el.style.transform="",150);

  S.gameHP--;
  updateHPBar();

  if(S.gameHP <= 0) {
    S.gameActive = false;
    successCatch();
  }
}

function successCatch() {
  const b = S.current;
  const mutation = S._pendingMutation;
  const col = RARITY[b.rar].color;

  S.caught[b.id] = {caught:true, mutation: mutation?.name || null};

  let xp = RARITY[b.rar].xp;
  let coins = RARITY[b.rar].coins;
  if(mutation?.bonus.includes("XP")) xp *= 2;
  if(mutation?.bonus.includes("Coins")) coins *= 2;
  if(mutation?.bonus.includes("x3")) { xp*=3; coins*=3; }

  addXP(xp);
  addCoins(coins);

  // Remove marker
  if(currentMarker) { map.removeLayer(currentMarker); S.markers=S.markers.filter(m=>m!==currentMarker); currentMarker=null; }

  closeCatch();
  const mutStr = mutation ? ` (${mutation.name})` : "";
  toast(`${b.e} ${b.nom}${mutStr} capturé ! +${xp}XP +${coins}🪙`);
}

function closeCatch() {
  document.getElementById("catch-modal").classList.remove("open");
  S.current=null; S.gameActive=false;
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function showTab(t) {
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("open"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  if(t==="dex") { document.getElementById("panel-dex").classList.add("open"); document.getElementById("nav-dex").classList.add("active"); renderDex("all"); }
  else if(t==="col") { document.getElementById("panel-col").classList.add("open"); document.getElementById("nav-col").classList.add("active"); renderCol(); }
  else if(t==="gp") { document.getElementById("panel-gp").classList.add("open"); document.getElementById("nav-gp").classList.add("active"); renderGP(); }
  else document.getElementById("nav-map").classList.add("active");
}

// ═══════════════════════════════════════
// POKÉDEX
// ═══════════════════════════════════════
function renderDex(f) {
  const total = Object.keys(S.caught).length;
  document.getElementById("dex-stats").textContent = `${total}/${BRAINROTS.length} capturés`;
  const rarities = ["all",...Object.keys(RARITY)];
  document.getElementById("dex-filters").innerHTML = rarities.map(r=>
    `<button class="filt ${f===r?"on":""}" onclick="renderDex('${r}')">${r==="all"?"Tous":r}</button>`
  ).join("");
  const list = f==="all" ? BRAINROTS : BRAINROTS.filter(b=>b.rar===f);
  document.getElementById("dex-grid").innerHTML = list.map(b=>{
    const entry = S.caught[b.id];
    const col = RARITY[b.rar]?.color||"#fff";
    return `<div class="dex-card ${entry?"caught-once":"locked"}" style="border-color:${entry?col+"44":"transparent"}">
      ${entry?.mutation?`<div class="dex-mut">✨</div>`:""}
      ${entry?`<div class="caught-badge">✓</div>`:""}
      <div class="dex-fallback">${entry?b.e:"❓"}</div>
      <div class="dex-name">${entry?b.nom:"???"}</div>
      <div class="dex-rar" style="color:${col}">${b.rar}</div>
      ${entry?.mutation?`<div style="font-size:7px;color:#aaa;margin-top:2px">${entry.mutation}</div>`:""}
    </div>`;
  }).join("");
}

// ═══════════════════════════════════════
// COLLECTION
// ═══════════════════════════════════════
function renderCol() {
  const caught = BRAINROTS.filter(b=>S.caught[b.id]);
  if(!caught.length) { document.getElementById("col-list").innerHTML=`<div class="empty">Aucun brainrot capturé...<br>Va explorer la carte !</div>`; return; }
  document.getElementById("col-list").innerHTML = caught.map(b=>{
    const entry = S.caught[b.id];
    const col = RARITY[b.rar]?.color||"#fff";
    return `<div class="col-item" style="border-left-color:${col}">
      <div class="col-emoji">${b.e}</div>
      <div class="col-info">
        <div class="col-name">${b.nom}</div>
        <div class="col-desc">${b.desc}</div>
        ${entry.mutation?`<div class="col-mut">✨ ${entry.mutation}</div>`:""}
        <span class="col-rar" style="background:${col}18;color:${col};border:1px solid ${col}30">${b.rar}</span>
      </div>
    </div>`;
  }).join("");
}

// ═══════════════════════════════════════
// GAMEPASS
// ═══════════════════════════════════════
function renderGP() {
  document.getElementById("gp-coins").textContent = S.coins;
  document.getElementById("gp-grid").innerHTML = GAMEPASSES.map(gp=>{
    const owned = hasPass(gp.id);
    return `<div class="gp-card ${owned?"owned":""}">
      <div class="gp-icon">${gp.icon}</div>
      <div class="gp-name">${gp.name}</div>
      <div class="gp-desc">${gp.desc}</div>
      <div class="gp-price">🪙 ${gp.price} coins</div>
      <button class="gp-btn" ${owned?"disabled":""} onclick="buyPass('${gp.id}',${gp.price})">
        ${owned?"✅ Acheté":"Acheter"}
      </button>
    </div>`;
  }).join("");
}

function buyPass(id, price) {
  if(S.coins < price) { toast("🪙 Pas assez de coins !"); return; }
  if(hasPass(id)) return;
  S.coins -= price;
  S.passes.push(id);
  save();
  updateHUD();
  renderGP();
  toast(`💎 Game Pass acheté !`);
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function toast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
load(); updateHUD(); initMap();
</script>
