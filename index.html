<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brainrot Go 🧠</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --commun: #9CA3AF;
    --peu-commun: #4ADE80;
    --rare: #60A5FA;
    --epique: #C084FC;
    --legendaire: #FBBF24;
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: #fff;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  #header {
    background: linear-gradient(135deg, #1a0533 0%, #0f0f1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
    flex-shrink: 0;
  }
  #header h1 {
    font-family: 'Bangers', cursive;
    font-size: 28px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #C084FC, #60A5FA, #FBBF24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #xp-bar-wrap { flex: 1; margin: 0 16px; }
  #xp-label { font-size: 10px; color: #888; margin-bottom: 3px; }
  #xp-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  #xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #C084FC, #60A5FA); border-radius: 3px; transition: width 0.5s; }
  #level-badge {
    font-family: 'Bangers', cursive;
    font-size: 20px;
    background: var(--card);
    border: 1px solid var(--epique);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: var(--epique);
    flex-shrink: 0;
  }

  /* MAP */
  #map {
    flex: 1;
    z-index: 1;
    position: relative;
  }
  .leaflet-tile-pane { filter: brightness(0.7) saturate(0.6) hue-rotate(200deg); }

  /* BOTTOM NAV */
  #nav {
    background: #12121f;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 1000;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 10px 0 8px;
    background: none;
    border: none;
    color: #555;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: color 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .nav-btn span { font-size: 10px; }
  .nav-btn.active { color: var(--epique); }
  .nav-btn:hover { color: #aaa; }

  /* PANELS */
  .panel {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 2000;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .panel.open { display: flex; }
  .panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    flex-shrink: 0;
  }
  .panel-header h2 { font-family: 'Bangers', cursive; font-size: 24px; letter-spacing: 1px; }
  .close-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .panel-content { flex: 1; overflow-y: auto; padding: 16px; }

  /* POKÉDEX */
  #pokedex-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .dex-card {
    background: var(--card);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .dex-card:hover { transform: scale(1.03); }
  .dex-card.locked { opacity: 0.3; filter: grayscale(1); }
  .dex-card .dex-emoji { font-size: 32px; margin-bottom: 4px; }
  .dex-card .dex-name { font-size: 9px; font-weight: 700; line-height: 1.2; }
  .dex-card .dex-rarity { font-size: 8px; margin-top: 3px; }
  .dex-card .dex-count {
    position: absolute;
    top: 4px; right: 6px;
    font-size: 10px;
    font-weight: 900;
    color: var(--legendaire);
  }

  /* COLLECTION (inventaire) */
  #collection-list { display: flex; flex-direction: column; gap: 10px; }
  .col-item {
    background: var(--card);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
  }
  .col-emoji { font-size: 36px; }
  .col-info { flex: 1; }
  .col-name { font-weight: 900; font-size: 14px; }
  .col-desc { font-size: 11px; color: #888; margin-top: 2px; }
  .col-spawn { font-size: 10px; color: #666; margin-top: 2px; }
  .rarity-badge {
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* CATCH MODAL */
  #catch-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 3000;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #catch-modal.open { display: flex; }
  #catch-box {
    background: var(--card);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    border: 1px solid var(--border);
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #catch-emoji { font-size: 80px; margin-bottom: 12px; animation: bounce 0.6s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  #catch-name { font-family: 'Bangers', cursive; font-size: 28px; letter-spacing: 1px; margin-bottom: 4px; }
  #catch-desc { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  #catch-spawn { font-size: 11px; color: #666; margin-bottom: 20px; }
  #catch-rarity { font-size: 12px; margin-bottom: 20px; }
  .catch-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Bangers', cursive;
    font-size: 22px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    margin-bottom: 8px;
  }
  .catch-btn:active { transform: scale(0.97); }
  #btn-catch { background: linear-gradient(135deg, #C084FC, #818CF8); color: #fff; }
  #btn-run { background: rgba(255,255,255,0.06); color: #888; font-size: 16px; padding: 10px; }

  /* MARKER CUSTOM */
  .brainrot-marker {
    background: var(--card);
    border-radius: 50%;
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border: 2px solid;
    cursor: pointer;
    animation: pulse 2s infinite;
    box-shadow: 0 0 12px currentColor;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a2e;
    border: 1px solid var(--epique);
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    z-index: 4000;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* FILTERS POKÉDEX */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .filt {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: #888;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }
  .filt.on { color: #fff; border-color: transparent; }
  .filt[data-f="all"].on { background: #333; }
  .filt[data-f="Commun"].on { background: #555; }
  .filt[data-f="Peu commun"].on { background: #166534; }
  .filt[data-f="Rare"].on { background: #1e40af; }
  .filt[data-f="Épique"].on { background: #581c87; }
  .filt[data-f="Légendaire"].on { background: #78350f; }

  #dex-stats { font-size: 12px; color: #666; margin-bottom: 12px; }

  .radar-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(192,132,252,0.3);
    animation: radar 3s infinite;
    pointer-events: none;
  }
  @keyframes radar {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0.6; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }
</style>
</head>

<!-- HEADER -->

  </div>
  <div id="level-badge" id="lvl-badge">1</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- BOTTOM NAV -->
<div id="nav">

  <button class="nav-btn" id="nav-dex" onclick="showTab('dex')">📖<span>Pokédex</span></button>
  <button class="nav-btn" id="nav-col" onclick="showTab('col')">🎒<span>Collection</span></button>
</div>

<!-- POKÉDEX PANEL -->

      <button class="filt" data-f="Épique">🟪 Épique</button>
      <button class="filt" data-f="Légendaire">🟨 Légendaire</button>
    </div>
    <div id="pokedex-grid"></div>
  </div>
</div>

<!-- COLLECTION PANEL -->
<div class="panel" id="panel-col">
  <div class="panel-header">
    <h2>🎒 MA COLLECTION</h2>
    <button class="close-btn" onclick="showTab('map')">✕</button>
  </div>
  <div class="panel-content">
    <div id="collection-list"><p style="color:#555;text-align:center;padding:40px">Aucun brainrot capturé pour l'instant...<br>Va explorer la carte !</p></div>
  </div>
</div>

<!-- CATCH MODAL -->
<div id="catch-modal">
  <div id="catch-box">
    <div id="catch-emoji">🧠</div>
    <div id="catch-name">???</div>
    <div id="catch-rarity"></div>
    <div id="catch-desc"></div>
    <div id="catch-spawn"></div>
    <button class="catch-btn" id="btn-catch" onclick="catchBrainrot()">⚡ ATTRAPER !</button>
    <button class="catch-btn" id="btn-run" onclick="closeCatch()">Fuir</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

// =============================================
// GAME STATE
// =============================================
const state = {
  level: 1,
  xp: 0,
  xpMax: 100,
  caught: {}, // id -> count
  playerPos: null,
  activeMarkers: [],
  currentBrainrot: null,
};

const RARITY_COLOR = {
  "Commun": "#9CA3AF",
  "Peu commun": "#4ADE80",
  "Rare": "#60A5FA",
  "Épique": "#C084FC",
  "Légendaire": "#FBBF24",
};

const RARITY_XP = {
  "Commun": 10,
  "Peu commun": 25,
  "Rare": 60,
  "Épique": 150,
  "Légendaire": 500,
};

// Load save
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem("brainrot-go") || "{}");
    if (s.caught) state.caught = s.caught;
    if (s.level) state.level = s.level;
    if (s.xp !== undefined) state.xp = s.xp;
    if (s.xpMax) state.xpMax = s.xpMax;
  } catch(e) {}
}

function saveState() {
  localStorage.setItem("brainrot-go", JSON.stringify({
    caught: state.caught,
    level: state.level,
    xp: state.xp,
    xpMax: state.xpMax,
  }));
}

function addXP(amount) {
  state.xp += amount;
  while (state.xp >= state.xpMax) {
    state.xp -= state.xpMax;
    state.level++;
    state.xpMax = Math.floor(state.xpMax * 1.4);
    showToast(`🎉 NIVEAU ${state.level} !`);
  }
  updateHUD();
  saveState();
}

function updateHUD() {
  document.getElementById("lvl-num").textContent = state.level;
  document.getElementById("xp-num").textContent = state.xp;
  document.getElementById("xp-max").textContent = state.xpMax;
  document.getElementById("xp-fill").style.width = (state.xp / state.xpMax * 100) + "%";
  document.getElementById("level-badge").textContent = state.level;
}

// =============================================
// MAP
// =============================================
let map;

function initMap() {
  map = L.map("map", { zoomControl: false, attributionControl: false });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(onPosition, onPosError, {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 10000,
    });
  } else {
    // Default: Paris
    setPosition({ coords: { latitude: 48.8566, longitude: 2.3522 } });
  }
}

let playerMarker = null;
function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  state.playerPos = [lat, lng];

  if (!playerMarker) {
    map.setView([lat, lng], 16);
    playerMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        className: "",
        html: `<div style="width:20px;height:20px;background:#C084FC;border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px #C084FC"></div>`,
        iconAnchor: [10, 10],
      })
    }).addTo(map);
    spawnBrainrots();
  } else {
    playerMarker.setLatLng([lat, lng]);
  }
}

function onPosError() {
  // Paris fallback
  setPosition({ coords: { latitude: 48.8566, longitude: 2.3522 } });
}

function setPosition(pos) {
  onPosition(pos);
}

function randomOffset(range) {
  return (Math.random() - 0.5) * range;
}

function weightedRandom() {
  const r = Math.random() * 100;
  if (r < 60) return "Commun";
  if (r < 85) return "Peu commun";
  if (r < 95) return "Rare";
  if (r < 99) return "Épique";
  return "Légendaire";
}

function spawnBrainrots() {
  if (!state.playerPos) return;
  const [lat, lng] = state.playerPos;

  // Clear old markers
  state.activeMarkers.forEach(m => map.removeLayer(m));
  state.activeMarkers = [];

  const count = 6 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    setTimeout(() => spawnOne(lat, lng), i * 300);
  }

  // Respawn every 2 min
  setTimeout(spawnBrainrots, 120000);
}

function spawnOne(lat, lng) {
  const rarity = weightedRandom();
  const pool = BRAINROTS.filter(b => b.rareté === rarity);
  const b = pool[Math.floor(Math.random() * pool.length)];
  const color = RARITY_COLOR[rarity];

  const mlat = lat + randomOffset(0.008);
  const mlng = lng + randomOffset(0.012);

  const icon = L.divIcon({
    className: "",
    html: `<div class="brainrot-marker" style="border-color:${color};color:${color}" title="${b.nom}">${b.emoji}</div>`,
    iconSize: [44, 44],
    iconAnchor: [22, 22],
  });

  const marker = L.marker([mlat, mlng], { icon }).addTo(map);
  marker.on("click", () => openCatch(b));
  state.activeMarkers.push(marker);
}

// =============================================
// CATCH
// =============================================
function openCatch(b) {
  state.currentBrainrot = b;
  const color = RARITY_COLOR[b.rareté];
  document.getElementById("catch-emoji").textContent = b.emoji;
  document.getElementById("catch-name").textContent = b.nom;
  document.getElementById("catch-desc").textContent = b.desc;
  document.getElementById("catch-spawn").textContent = "📍 " + b.spawn;
  document.getElementById("catch-rarity").innerHTML = `<span class="rarity-badge" style="background:${color}22;color:${color};border:1px solid ${color}">${b.rareté}</span>`;
  document.getElementById("catch-modal").classList.add("open");
}

function closeCatch() {
  document.getElementById("catch-modal").classList.remove("open");
  state.currentBrainrot = null;
}

function catchBrainrot() {
  const b = state.currentBrainrot;
  if (!b) return;

  // Catch rate based on rarity
  const rates = { "Commun": 0.95, "Peu commun": 0.8, "Rare": 0.6, "Épique": 0.4, "Légendaire": 0.15 };
  const rate = rates[b.rareté] || 0.8;

  if (Math.random() < rate) {
    state.caught[b.id] = (state.caught[b.id] || 0) + 1;
    addXP(RARITY_XP[b.rareté]);
    closeCatch();
    showToast(`${b.emoji} ${b.nom} capturé !`);
    // Remove the marker that was clicked
    const idx = state.activeMarkers.findIndex(m => {
      const pos = m.getLatLng();
      return true; // simplified
    });
  } else {
    showToast(`💨 ${b.nom} s'est échappé !`);
    closeCatch();
  }
}

// =============================================
// TABS
// =============================================
function showTab(tab) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("open"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));

  if (tab === "dex") {
    document.getElementById("panel-dex").classList.add("open");
    document.getElementById("nav-dex").classList.add("active");
    renderPokedex("all");
  } else if (tab === "col") {
    document.getElementById("panel-col").classList.add("open");
    document.getElementById("nav-col").classList.add("active");
    renderCollection();
  } else {
    document.getElementById("nav-map").classList.add("active");
  }
}

// =============================================
// POKÉDEX
// =============================================
let dexFilter = "all";

function renderPokedex(filter) {
  dexFilter = filter;
  const grid = document.getElementById("pokedex-grid");
  const list = filter === "all" ? BRAINROTS : BRAINROTS.filter(b => b.rareté === filter);
  const caught = Object.keys(state.caught).length;
  document.getElementById("dex-stats").textContent = `${caught}/100 capturés`;

  grid.innerHTML = list.map(b => {
    const count = state.caught[b.id] || 0;
    const color = RARITY_COLOR[b.rareté];
    return `<div class="dex-card ${count === 0 ? "locked" : ""}" style="border-color:${count>0?color:"transparent"}" onclick="showDexDetail(${b.id})">
      ${count > 0 ? `<div class="dex-count">x${count}</div>` : ""}
      <div class="dex-emoji">${count > 0 ? b.emoji : "❓"}</div>
      <div class="dex-name">${count > 0 ? b.nom : "???"}</div>
      <div class="dex-rarity" style="color:${color}">${b.rareté}</div>
    </div>`;
  }).join("");

  document.querySelectorAll(".filt").forEach(btn => {
    btn.classList.toggle("on", btn.dataset.f === filter);
    btn.onclick = () => renderPokedex(btn.dataset.f);
  });
}

function showDexDetail(id) {
  const b = BRAINROTS.find(x => x.id === id);
  if (!b || !state.caught[b.id]) return;
  showToast(`${b.emoji} ${b.nom} — ${b.spawn}`);
}

// =============================================
// COLLECTION
// =============================================
function renderCollection() {
  const list = document.getElementById("collection-list");
  const caught = BRAINROTS.filter(b => state.caught[b.id]);

  if (caught.length === 0) {
    list.innerHTML = `<p style="color:#555;text-align:center;padding:40px">Aucun brainrot capturé pour l'instant...<br>Va explorer la carte !</p>`;
    return;
  }

  list.innerHTML = caught.map(b => {
    const color = RARITY_COLOR[b.rareté];
    return `<div class="col-item" style="border-left:3px solid ${color}">
      <div class="col-emoji">${b.emoji}</div>
      <div class="col-info">
        <div class="col-name">${b.nom}</div>
        <div class="col-desc">${b.desc}</div>
        <div class="col-spawn">📍 ${b.spawn}</div>
      </div>
      <div>
        <div class="rarity-badge" style="background:${color}22;color:${color};border:1px solid ${color}">${b.rareté}</div>
        <div style="text-align:center;margin-top:6px;font-size:11px;color:#888">x${state.caught[b.id]}</div>
      </div>
    </div>`;
  }).join("");
}

// =============================================
// TOAST
// =============================================
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// =============================================
// INIT
// =============================================
loadState();
updateHUD();
initMap();
</script>
